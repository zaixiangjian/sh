name: Repository Maintenance

on:
  schedule:
    - cron: "17 8 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Repository Check
        run: |
          git log -1 --oneline
          git rev-list --count HEAD
